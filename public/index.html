<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palais Layel — Salle des Fêtes à Bordj El Bahri, Alger</title>
</head>
<body>
  <!-- Hidden static form for Netlify build-time detection -->
  <form name="reservation" data-netlify="true" hidden style="display:none">
    <input type="hidden" name="form-name" value="reservation" />
    <input type="text" name="nom-complet" />
    <input type="tel" name="telephone" />
    <select name="type-evenement">
      <option>Mariage</option>
      <option>Fiançailles</option>
      <option>Anniversaire</option>
      <option>Autre</option>
    </select>
    <input type="date" name="date" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
